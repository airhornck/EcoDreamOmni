[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = False
ignore_missing_imports = True
follow_imports = skip
exclude = tests/

[mypy-src.services.*]
ignore_errors = True

[mypy-src.api.*]
ignore_errors = True

[mypy-src.core.*]
ignore_errors = True

[mypy-src.models.*]
ignore_errors = True

[mypy-src.functions.*]
ignore_errors = True

[mypy-src.skills.*]
ignore_errors = True

[mypy-src.harness.*]
ignore_errors = True

[mypy-src.celery_app]
ignore_errors = True
