services:
  postgres:
    image: postgres:16-alpine
    container_name: ecodream-postgres
    environment:
      POSTGRES_USER: ecodream
      POSTGRES_PASSWORD: ecodream_dev
      POSTGRES_DB: ecodream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecodream"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecodream-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ecodream-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ecodream:ecodream_dev@postgres:5432/ecodream
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ecodream-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
